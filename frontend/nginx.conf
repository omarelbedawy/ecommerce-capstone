server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html; # so client-side routing doesn't 404 on refresh
    }

    location /api {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
    }

    location /uploads {
        proxy_pass http://backend:5000;
    }
}
